name: Android Release

on:
  push:
    branches: [main]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'releasebuild')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Recreate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run lint and unit tests
        run: ./gradlew lint test

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Prepare release metadata
        id: relmeta
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          first_line="$(printf '%s' "${COMMIT_MSG}" | head -n1)"
          echo "first_line=${first_line}" >> "$GITHUB_OUTPUT"
          echo "tag=releasebuild-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.relmeta.outputs.tag }}
          name: ${{ steps.relmeta.outputs.first_line }}
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
