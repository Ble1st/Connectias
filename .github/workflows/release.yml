name: Android Release

on:
  push:
    branches: [main]

jobs:
  build:
    if: startsWith(github.event.head_commit.message, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Recreate keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Extract version from commit message
        id: version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          first_line="$(printf '%s' "${COMMIT_MESSAGE:-}" | head -n1)"
          if ! printf '%s' "$first_line" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+
          fi
          version_name="$first_line"
          # Convert vX.Y.Z to numeric code XXYYZZ (padded) for Play Store friendly code
          version_code="$(printf '%s' "$first_line" | sed -E 's/^v//' | awk -F. '{printf("%d%02d%02d\n",$1,$2,$3)}')"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -Papp.versionName='${{ steps.version.outputs.version_name }}' \
            -Papp.versionCode='${{ steps.version.outputs.version_code }}'

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
; then
            echo "Commit message must start with vX.Y.Z (semantic version)"; exit 1
          fi
          version_name="$first_line"
          # Convert vX.Y.Z to numeric code XXYYZZ (padded) for Play Store friendly code
          version_code="$(printf '%s' "$first_line" | sed -E 's/^v//' | awk -F. '{printf("%d%02d%02d\n",$1,$2,$3)}')"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -Papp.versionName='${{ steps.version.outputs.version_name }}' \
            -Papp.versionCode='${{ steps.version.outputs.version_code }}'

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
