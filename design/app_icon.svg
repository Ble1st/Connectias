<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="24" cy="24" r="22" fill="url(#grad1)" stroke="#4A90E2" stroke-width="1" />

  <!-- Diagram Lines (Connecting Center to Tips) -->
  <g stroke="#4A90E2" stroke-width="1" opacity="0.4" stroke-linecap="round">
    <line x1="24" y1="24" x2="24" y2="6" />   <!-- Top -->
    <line x1="24" y1="24" x2="41.1" y2="18.4" /> <!-- Top Right -->
    <line x1="24" y1="24" x2="34.6" y2="38.6" /> <!-- Bottom Right -->
    <line x1="24" y1="24" x2="13.4" y2="38.6" /> <!-- Bottom Left -->
    <line x1="24" y1="24" x2="6.9" y2="18.4" />  <!-- Top Left -->
  </g>
  
  <!-- Diagram Connections (Pentagon) -->
  <path d="M24 6 L41.1 18.4 L34.6 38.6 L13.4 38.6 L6.9 18.4 Z" 
        fill="none" stroke="#4A90E2" stroke-width="1" opacity="0.2" />

  <!-- Center Circle -->
  <circle cx="24" cy="24" r="10" fill="#4A90E2" filter="url(#shadow)" />

  <!-- The "C" Logo -->
  <path d="M28 19 A 5 5 0 0 0 22 21 L 22 21 A 5 5 0 0 0 22 27 A 5 5 0 0 0 28 29" 
        fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />

  <!-- Tip Symbols (Gold/Orange #F5A623) -->
  
  <!-- Top: Security (Shield) -->
  <g transform="translate(24, 6)">
    <path fill="#F5A623" d="M0 -4 L-3 -2 V1 C-3 3.5 0 5 0 5 C0 5 3 3.5 3 1 V-2 Z" />
  </g>

  <!-- Top Right: Network (Signal) -->
  <g transform="translate(41.1, 18.4)">
    <path fill="#F5A623" d="M0 4 L-3 0 A 4 4 0 0 1 3 0 Z M0 1 L-1.5 -1 A 2 2 0 0 1 1.5 -1 Z" transform="rotate(180) scale(0.8)" />
    <circle fill="#F5A623" r="1" cy="-2" />
  </g>

  <!-- Bottom Right: Battery (Bolt) -->
  <g transform="translate(34.6, 38.6)">
    <path fill="#F5A623" d="M-1 -3 L 2 -3 L 0 0 L 2 0 L -1 4 L 0 1 L -2 1 Z" />
  </g>

  <!-- Bottom Left: Hardware (Chip/Square) -->
  <g transform="translate(13.4, 38.6)">
    <rect fill="#F5A623" x="-3" y="-3" width="6" height="6" rx="1" />
    <rect fill="#FFFFFF" x="-1" y="-1" width="2" height="2" />
  </g>

  <!-- Top Left: Privacy (Eye) -->
  <g transform="translate(6.9, 18.4)">
    <path fill="#F5A623" d="M-4 0 Q 0 -4 4 0 Q 0 4 -4 0 Z" />
    <circle fill="#FFFFFF" r="1.5" />
    <circle fill="#F5A623" r="0.8" />
  </g>

</svg>
